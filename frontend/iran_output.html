<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>خروجی از حساب (ایران)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    @media (max-width:700px){
      /* جلوگیری از زوم ناخواسته موبایل */
      input, select, textarea{font-size:16px}
    }
  </style>
</head>
<body>
<div class="page">
  <div class="topbar sticky">
    <div class="title">خروجی از حساب (ایران)</div>
    <div class="row">
      <a class="btnLink btn" href="/iran">← بازگشت</a>
    </div>
  </div>

  <div class="card pad">
    <p class="muted" style="margin:0 0 10px">
      خروجی بانک‌های معمولی: <b>کارمزد و مالیات اتومات</b> محاسبه می‌شود. (سامان مالیات همیشه صفر)
    </p>

    <div class="row" style="margin-bottom:10px">
      <label class="switch" style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)">
        <input type="checkbox" id="autoCalc" checked />
        محاسبه اتومات کارمزد/مالیات
      </label>
    </div>

    <div class="grid">
      <div>
        <label>بانک (منبع)</label>
        <select id="bank">
          <option value="ملی">ملی</option>
          <option value="صادرات">صادرات</option>
          <option value="مسکن">مسکن</option>
          <option value="ملت">ملت</option>
          <option value="تجارت">تجارت</option>
          <option value="پارسیان">پارسیان</option>
          <option value="سامان">سامان</option>
          <option value="کشاورزی">کشاورزی</option>
          <option value="سامان (مالیات)">سامان (مالیات)</option>
        </select>
      </div>

      <div>
        <label>بانک مقصد (اختیاری)</label>
        <input id="destBank" placeholder="مثل: سپه یا ملت" />
      </div>

      <div>
        <label>مبلغ (ریال)</label>
        <input id="amount" inputmode="numeric" placeholder="مثلاً 20,000,000" />
      </div>

      <div>
        <label>نام برداشت‌کننده (صاحب حساب)</label>
        <input id="name" placeholder="مثلاً: علی نصیری" />
      </div>

      <div>
        <label>نوع حواله</label>
        <select id="transferType">
          <option value="کارت به کارت">کارت به کارت</option>
          <option value="شبا">شبا</option>
          <option value="ساتنا">ساتنا</option>
          <option value="حساب به حساب">حساب به حساب</option>
          <option value="پایا">پایا</option>
          <option value="نقدی">نقدی</option>
          <option value="نامشخص">نامشخص</option>
        </select>
      </div>

      <div>
        <label>کارمزد</label>
        <input id="fee" inputmode="numeric" placeholder="0" />
      </div>

      <div>
        <label>مالیات</label>
        <input id="tax" inputmode="numeric" placeholder="0" />
      </div>

      <div>
        <label>تاریخ (شمسی)</label>
        <input id="jdate" readonly />
      </div>

      <div style="grid-column:1/-1">
        <label>توضیحات (اختیاری)</label>
        <textarea id="desc" placeholder="..."></textarea>
      </div>

      <div style="grid-column:1/-1;display:flex;justify-content:flex-end">
        <button class="btn red" id="save">ثبت خروجی</button>
      </div>
    </div>

    <div id="msg" class="msg"></div>
  </div>
</div>

<!-- date picker popup -->
<div id="overlay" class="overlay" style="position:fixed;inset:0;background:rgba(0,0,0,.25);display:none;align-items:center;justify-content:center;z-index:9998">
  <div class="modal" style="background:#fff;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.25);width:min(520px,92vw);padding:14px;border:1px solid var(--line)">
    <h3 style="margin:0 0 10px;font-size:14px">انتخاب تاریخ شمسی</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <select id="py"></select>
      <select id="pm"></select>
      <select id="pd"></select>
    </div>
    <div class="row" style="margin-top:12px;justify-content:flex-end">
      <button class="btn" id="closePop" type="button">انصراف</button>
      <button class="btn blue" id="okPop" type="button">تایید</button>
    </div>
  </div>
</div>

<script>
  // popup show/hide helper
  const _overlayEl = document.getElementById("overlay");
  const _origAdd = _overlayEl.classList.add.bind(_overlayEl.classList);
  const _origRemove = _overlayEl.classList.remove.bind(_overlayEl.classList);
  _overlayEl.classList.add = (cls)=>{ if(cls==="show") _overlayEl.style.display="flex"; _origAdd(cls); };
  _overlayEl.classList.remove = (cls)=>{ if(cls==="show") _overlayEl.style.display="none"; _origRemove(cls); };
  const TAX_BANK = "سامان (مالیات)";
  const TAX_RATE = 0.002;   // 0.2%
  
  // کارمزد‌های جدید بر اساس نوع حواله
  // جدول کارمزد 1404 - بانک مرکزی
  // کارت به کارت / شبا: تا 10M → 9000، هر 10M مازاد → +3200
  const FEE_RULES = {
    "کارت به کارت": {type: "tiered", base_fee: 9000, extra_fee: 3200, tier_size: 10_000_000},
    "شبا":          {type: "tiered", base_fee: 9000, extra_fee: 3200, tier_size: 10_000_000},
    "پایا":         {type: "percent", value: 0.0001, min: 3000, max: 75000},
    "ساتنا":        {type: "percent", value: 0.0002, min: 0,    max: 350000},
    "حساب به حساب": {type: "percent", value: 0.0001},
    "نقدی":         {type: "percent", value: 0.005,  min: 2000},
    "نامشخص":       {type: "percent", value: 0.0001},
  };

  function fmt(n){ return new Intl.NumberFormat('en-US').format(n||0); }
  
  function faToEn(s){
    const map = {'۰':'0','۱':'1','۲':'2','۳':'3','۴':'4','۵':'5','۶':'6','۷':'7','۸':'8','۹':'9'};
    return String(s).replace(/[۰-۹]/g, ch => map[ch] || ch);
  }
  
  function toNum(s){
    let cleaned = String(s||'').replace(/,/g,'').replace(/\s/g,'');
    cleaned = faToEn(cleaned); // تبدیل اعداد فارسی به انگلیسی
    const n = parseFloat(cleaned);
    return Number.isFinite(n) ? n : 0;
  }

  const bankEl = document.getElementById("bank");
  const destBankEl = document.getElementById("destBank");
  const amountEl = document.getElementById("amount");
  const nameEl = document.getElementById("name");
  const feeEl = document.getElementById("fee");
  const taxEl = document.getElementById("tax");
  const transferTypeEl = document.getElementById("transferType");
  const autoEl = document.getElementById("autoCalc");

  function formatMoneyInput(el){
    const n = toNum(el.value);
    el.value = n ? fmt(Math.round(n)) : "";
  }

  amountEl.addEventListener("input", ()=>{
    const n = toNum(amountEl.value);
    amountEl.value = n ? fmt(Math.round(n)) : "";
    calcAuto();
  });
  feeEl.addEventListener("input", ()=> formatMoneyInput(feeEl));
  taxEl.addEventListener("input", ()=> formatMoneyInput(taxEl));
  bankEl.addEventListener("change", calcAuto);
  transferTypeEl.addEventListener("change", calcAuto);
  autoEl.addEventListener("change", calcAuto);

  function calcAuto(){
    const bank = bankEl.value;
    const amt = toNum(amountEl.value);
    const transferType = transferTypeEl.value;

    if(!autoEl.checked){
      return;
    }

    // اگر مبلغ وارد نشده، کارمزد و مالیات صفر باشد
    if(!amt || amt <= 0){
      feeEl.value = "0";
      taxEl.value = "0";
      return;
    }

    if(bank === TAX_BANK){
      feeEl.value = "0";
      taxEl.value = "0";
      return;
    }

    // محاسبه کارمزد براساس نوع حواله (جدول 1404)
    let fee = 0;
    const rule = FEE_RULES[transferType] || FEE_RULES["نامشخص"];

    if(rule.type === "tiered"){
      if(amt <= rule.tier_size){
        fee = rule.base_fee;
      } else {
        const extraTiers = Math.ceil((amt - rule.tier_size) / rule.tier_size);
        fee = rule.base_fee + extraTiers * rule.extra_fee;
      }
    } else if(rule.type === "fixed"){
      fee = rule.value;
    } else if(rule.type === "percent"){
      fee = amt * rule.value;
      if(rule.min !== undefined) fee = Math.max(fee, rule.min);
      if(rule.max !== undefined) fee = Math.min(fee, rule.max);
    }
    
    const tax = Math.round(amt * TAX_RATE);
    feeEl.value = fee ? fmt(Math.round(fee)) : "0";
    taxEl.value = tax ? fmt(tax) : "0";
  }

  function faDigitsToEn(s){
    const map={'۰':'0','۱':'1','۲':'2','۳':'3','۴':'4','۵':'5','۶':'6','۷':'7','۸':'8','۹':'9'};
    return String(s).replace(/[۰-۹]/g, ch => map[ch] || ch);
  }
  function todayJalali(){
    const f = new Intl.DateTimeFormat('fa-IR-u-ca-persian', {year:'numeric',month:'2-digit',day:'2-digit'});
    return faDigitsToEn(f.format(new Date()));
  }

  // تاریخ: با کلیک، انتخاب‌گر سال/ماه/روز باز می‌شود
  const jdateEl = document.getElementById('jdate');
  jdateEl.value = todayJalali();

  let activeJdateEl = null;
  function parseJdate(s){
    const raw = faToEn(String(s||"")).trim();
    const parts = raw.split("/");
    if(parts.length !== 3) return null;
    const y = parseInt(parts[0],10), m = parseInt(parts[1],10), d = parseInt(parts[2],10);
    if(!Number.isFinite(y) || !Number.isFinite(m) || !Number.isFinite(d)) return null;
    return {y,m,d};
  }
  function pad2(n){ return String(n).padStart(2,"0"); }
  function openPicker(target){
    activeJdateEl = target;
    const v = parseJdate(target.value) || parseJdate(todayJalali());
    const ySel = document.getElementById("py");
    const mSel = document.getElementById("pm");
    const dSel = document.getElementById("pd");
    const y0 = v?.y || 1405;
    const ys = [];
    for(let y=y0-3; y<=y0+3; y++) ys.push(y);
    ySel.innerHTML = ys.map(y=>`<option value="${y}">${y}</option>`).join("");
    ySel.value = String(y0);
    mSel.innerHTML = Array.from({length:12},(_,i)=>i+1).map(m=>`<option value="${pad2(m)}">${pad2(m)}</option>`).join("");
    mSel.value = pad2(v?.m || 1);
    dSel.innerHTML = Array.from({length:31},(_,i)=>i+1).map(d=>`<option value="${pad2(d)}">${pad2(d)}</option>`).join("");
    dSel.value = pad2(v?.d || 1);
    document.getElementById("overlay").classList.add("show");
  }
  function closePicker(){ document.getElementById("overlay").classList.remove("show"); }
  document.getElementById("okPop").addEventListener("click", ()=>{
    const y = document.getElementById("py").value;
    const m = document.getElementById("pm").value;
    const d = document.getElementById("pd").value;
    if(activeJdateEl) activeJdateEl.value = `${y}/${m}/${d}`;
    closePicker();
  });
  document.getElementById("closePop").addEventListener("click", closePicker);
  jdateEl.addEventListener("pointerdown", (e)=>{ e.preventDefault(); jdateEl.blur(); openPicker(jdateEl); });
  jdateEl.addEventListener("click", (e)=>{ e.preventDefault(); jdateEl.blur(); openPicker(jdateEl); });

  // init
  calcAuto();

  document.getElementById("save").addEventListener("click", async ()=>{
    const bank = bankEl.value;
    const destBank = (destBankEl.value||"").trim();
    const amount = toNum(amountEl.value);
    const fee = toNum(feeEl.value);
    const tax = toNum(taxEl.value);
    const transferType = transferTypeEl.value;
    const name = (nameEl.value||"").trim();
    const desc = (document.getElementById("desc").value||"").trim();
    const jdate = (document.getElementById("jdate").value||"").trim();

    if(!bank || !amount){
      document.getElementById("msg").textContent = "بانک و مبلغ را کامل وارد کنید.";
      return;
    }

    const payload = {
      type: "ایران",
      iran_type: "خروجی",
      bank_name: bank,
      destination_bank: destBank,
      iran_amount: amount,
      depositor_name: name,
      transfer_type: transferType,
      deposit_fee: fee,
      tax: tax,
      description: desc,
      jdate: jdate
    };

    const r = await fetch("/transactions", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });

    if(!r.ok){
      document.getElementById("msg").textContent = "خطا در ثبت (سرور).";
      return;
    }
    document.getElementById("msg").textContent = "ثبت شد ✅";
    amountEl.value="";
    nameEl.value="";
    destBankEl.value="";
    feeEl.value="0";
    taxEl.value="0";
    document.getElementById("desc").value="";
    transferTypeEl.value="کارت به کارت";
    calcAuto();
  });
</script>
</body>
</html>
